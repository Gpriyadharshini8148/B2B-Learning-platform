openapi: 3.0.3
info:
  title: Udemy Clone API
  version: 1.0.0
  description: API for Managing Organizations, Courses, Users, and Multi-tenancy.
paths:
  /api/:
    get:
      operationId: api_retrieve
      description: Main entry point for the Udemy Clone Admin API.
      tags:
      - api
      security:
      - KeycloakAuthentication: []
      - SessionAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/access/:
    get:
      operationId: api_access_retrieve
      description: Overview of Authentication and Access endpoints.
      tags:
      - api
      security:
      - KeycloakAuthentication: []
      - SessionAuthentication: []
