components:
  schemas:
    AcceptInvitation:
      type: object
      properties:
        token:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
      required:
      - password
    ApprovalStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - pending_otp
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
        * `pending_otp` - Pending OTP
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        is_deleted:
          type: boolean
        created_by:
          type: string
          nullable: true
          maxLength: 100
        updated_by:
          type: string
          nullable: true
          maxLength: 100
        deleted_by:
          type: string
          nullable: true
          maxLength: 100
        deleted_at:
          type: string
          format: date-time
          nullable: true
        action:
          type: string
          maxLength: 255
        entity_type:
          type: string
          maxLength: 255
        entity_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        metadata:
          type: string
          nullable: true
        organization:
          type: integer
          nullable: true
        user:
          type: integer
          nullable: true
      required:
      - action
      - created_at
      - entity_id
      - entity_type
      - id
      - updated_at
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
      required:
      - id
      - name
    Certificate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        certificate_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
        enrollment:
          type: integer
        user_email:
          type: string
          format: email
          readOnly: true
        course_title:
          type: string
          readOnly: true
      required:
      - certificate_url
      - course_title
      - enrollment
      - id
      - user_email
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        is_deleted:
          type: boolean
          readOnly: true
        created_by:
          type: string
          readOnly: true
          nullable: true
        updated_by:
          type: string
          readOnly: true
          nullable: true
        deleted_by:
          type: string
          readOnly: true
          nullable: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        level:
          type: string
          maxLength: 100
        language:
          type: string
          maxLength: 100
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        is_global:
          type: boolean
        is_published:
          type: boolean
        organization:
          type: integer
          readOnly: true
          nullable: true
        instructor:
          type: integer
          nullable: true
        category:
          type: integer
          nullable: true
      required:
      - created_at
      - created_by
      - deleted_at
      - deleted_by
      - description
      - id
      - is_active
      - is_deleted
      - language
      - level
      - organization
      - title
      - updated_at
      - updated_by
    CourseAssignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course:
          type: integer
        user:
          type: integer
        course_name:
          type: string
          readOnly: true
        user_email:
          type: string
          readOnly: true
        due_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        assigned_by:
          type: integer
          readOnly: true
          nullable: true
      required:
      - assigned_by
      - course
      - course_name
      - created_at
      - id
      - user
      - user_email
